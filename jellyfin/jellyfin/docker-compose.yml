services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /home/dominik/jellyfin/config:/config
      - /home/dominik/jellyfin/cache:/cache

      - type: bind
        source: /home/dominik/Videos/Movies
        target: /movies
        read_only: true
      - type: bind
        source: /home/dominik/Videos/TV
        target: /tv
        read_only: true
    restart: 'no'

